<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OceanTalk | Simple & Secure Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="auth-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="auth-title">Welcome to OceanTalk</h2>
            <p id="auth-desc">Please login to enter the harbor.</p>
            <form id="auth-form">
                <input type="text" id="username-input" placeholder="Username" required maxlength="20">
                <input type="password" id="password-input" placeholder="Password" required>
                <button type="submit" id="auth-submit-btn">Login</button>
            </form>
            <p class="auth-toggle">
                Don't have an account? <a href="#" id="toggle-auth">Sign Up</a>
            </p>
        </div>
    </div>

    <div class="app-container hidden" id="main-app">
        <aside id="sidebar">
            <div class="sidebar-header">
                <h3>OceanTalk</h3>
                <span id="online-count">0</span>
            </div>
            
            <div class="sidebar-section">
                <h4>CHANNELS</h4>
                <ul id="rooms-list">
                    <li class="room-item active" data-room-id="global">
                        <span class="icon">⚓</span>
                        <span class="name">Global Harbor</span>
                    </li>
                </ul>
            </div>

            <div class="sidebar-section">
                <h4>DIRECT MESSAGES</h4>
                <ul id="online-users-list">
                    <!-- Online users will appear here -->
                </ul>
            </div>
        </aside>

        <div class="chat-main">
            <header>
                <div class="logo">
                    <span class="icon">🌊</span>
                    <h1>OceanTalk</h1>
                </div>
                <div class="user-info">
                    <span id="current-username"></span>
                    <button id="logout-btn" title="Leave Harbor">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
                <div class="status">
                    <span id="connection-dot"></span>
                </div>
            </header>

            <main id="chat-window">
                <div id="messages">
                    <div class="system-message">Welcome to the harbor. Start chatting!</div>
                </div>
                <div id="typing-indicator" class="hidden">
                    <span id="typing-text"></span>
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>
            </main>

            <footer>
                <form id="chat-form">
                    <input type="file" id="image-input" accept="image/*" class="hidden">
                    <button type="button" id="upload-btn" title="Send Image">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    </button>
                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                    <button type="submit" id="send-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </footer>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
